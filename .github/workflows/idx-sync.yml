name: IDX hourly sync

# Hourly incremental IDX sync (IDX spec §2.6). Runs the sync DIRECTLY on the
# GitHub runner (npm run idx:sync:incremental) — NOT by pinging Vercel.
#
# Why not ping /api/cron/idx-sync like before? That endpoint runs as a Vercel
# serverless function hard-capped at 60s. A feed-wide delta with full Media
# expand does not finish in 60s, so Vercel returned 504, the function saved
# nothing, the cursor never advanced, and every hour retried the same doomed
# pull (a permanent 504 loop). The runner has a multi-hour timeout, so the sync
# actually completes here — same code path (runIdxSync), just somewhere it can
# run long enough. Vercel's Hobby plan also only allows daily crons, which is why
# this was a GitHub Action in the first place.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions) —
# the SAME set the initial-sync workflow uses:
#   DATABASE_URL, REALCOMP_CLIENT_ID, REALCOMP_CLIENT_SECRET,
#   REALCOMP_BASE_URL, REALCOMP_AUTH_URL, REALCOMP_AUDIENCE, REALCOMP_OFFICE_KEYS

on:
  schedule:
    # Run at :17 past every hour, NOT on the hour. GitHub Actions delays (and
    # under load, drops) scheduled runs, and the top of the hour is its peak
    # load window, so an off-the-hour minute is far more reliable. Cadence is
    # still best-effort — GHA never guarantees exact hourly timing.
    - cron: '17 * * * *'
  workflow_dispatch: {} # allow manual runs for testing

concurrency:
  group: idx-sync
  cancel-in-progress: false

jobs:
  idx-sync:
    runs-on: ubuntu-latest
    # Realcomp stalls the feed-wide query in ~20-min stretches; the sync waits
    # those out (patient retries), so give it room. Still well short of the 6h
    # runner limit, and the sync is checkpoint-resumable across runs regardless.
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run IDX sync
        env:
          # The sync needs the DB + Realcomp creds; skip the app's full env
          # validation (which also wants NextAuth/admin vars).
          SKIP_ENV_VALIDATION: '1'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REALCOMP_CLIENT_ID: ${{ secrets.REALCOMP_CLIENT_ID }}
          REALCOMP_CLIENT_SECRET: ${{ secrets.REALCOMP_CLIENT_SECRET }}
          REALCOMP_BASE_URL: ${{ secrets.REALCOMP_BASE_URL }}
          REALCOMP_AUTH_URL: ${{ secrets.REALCOMP_AUTH_URL }}
          REALCOMP_AUDIENCE: ${{ secrets.REALCOMP_AUDIENCE }}
          REALCOMP_OFFICE_KEYS: ${{ secrets.REALCOMP_OFFICE_KEYS }}
        run: npm run idx:sync:incremental
